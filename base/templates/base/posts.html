{% extends 'main.html' %}

{% block content %}

<div style="padding:30px; max-width:800px; margin:auto;">

  <h2>Create Post</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <textarea name="content" placeholder="What's on your mind?" required></textarea>

    <br><br>

    
    <input type="file" name="image">

    <br><br>

    <button type="submit" class="btn btn--main">Post</button>
</form>

  <hr>

  <h2>Feed</h2>

  {% for post in posts %}
    <div style="padding:15px; border:1px solid #ddd; margin:15px 0; border-radius:10px;">
      <b>{{post.user.username}}</b>
      <p><p>{{post.content}}</p>

{% if post.image %}
    <img src="{{post.image.url}}" style="width:300px; border-radius:10px; margin-top:10px;">
{% endif %}</p>
      <small>{{post.created|timesince}} ago</small>
    </div>
  {% endfor %}

</div>

{% endblock %}

{% extends 'main.html' %}

{% block content %}

<div class="container">
  <h2>Notifications</h2>

  {% if requests %}
    
    {% for req in requests %}
      <div style="
        padding:12px;
        margin:10px 0;
        background:#2d2d2d;
        border-radius:10px;
        color:white;
      ">
        <p>
          <b>{{ req.sender.username }}</b> sent you a friend request
        </p>

        <a href="{% url 'accept-friend' req.id %}" style="
          background:#27ae60;
          padding:6px 10px;
          border-radius:6px;
          color:white;
          text-decoration:none;
        ">
          Accept
        </a>
      </div>
    {% endfor %}

  {% else %}
    <p>No notifications yet</p>
  {% endif %}

</div>

{% endblock %}

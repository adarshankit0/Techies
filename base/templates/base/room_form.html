{% extends 'main.html' %}

{% block content %}

<main class="create-room layout">
  <div class="container">

    <div class="layout__box">
      <div class="layout__boxHeader">
        <div class="layout__boxTitle">
          <a href="{{request.META.HTTP_REFERER}}">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
              <path d="M13.12 23.12l-1.41-1.41 6.71-6.71-6.71-6.71 1.41-1.41 8.12 8.12z"></path>
            </svg>
          </a>
          <h3>Create / Update Study Room</h3>
        </div>
      </div>

      <div class="layout__body">

        <form method="POST" action="">
          {% csrf_token %}

          
          <div class="form__group">
            <label>Select Topic</label>

            
            <input 
              type="text" 
              id="topicSearch" 
              placeholder="Search topic..." 
              onkeyup="filterTopics()" 
            />

            
            <select name="topic" id="topicSelect" onchange="toggleTopicInput()" required>
              <option value="">-- Select Topic --</option>

              {% for topic in topics %}
                <option value="{{ topic.name }}">
                  {% if topic.name == "Python" %}🐍{% elif topic.name == "JavaScript" %}⚡{% elif topic.name == "C++" %}💻{% else %}📘{% endif %}
                  {{ topic.name }}
                </option>
              {% endfor %}

              <option value="new">➕ Create New Topic</option>
            </select>

            
            <div id="newTopicBox" style="display:none; margin-top:10px;">
              <input 
                type="text" 
                name="new_topic" 
                placeholder="Enter new topic..." 
              />
            </div>
          </div>

          
          <div class="form__group">
            <label for="name">Room Name</label>
            <input type="text" name="name" placeholder="Enter room name..." value="{{room.name}}" required>
          </div>

          
          <div class="form__group">
            <label for="description">Room Description</label>
            <textarea name="description" placeholder="Write something...">{{room.description}}</textarea>
          </div>

          <div class="form__action">
            <a class="btn btn--dark" href="{{request.META.HTTP_REFERER}}">Cancel</a>
            <button class="btn btn--main" type="submit">Submit</button>
          </div>

        </form>

      </div>
    </div>

  </div>
</main>


<script>
function toggleTopicInput() {
    var select = document.getElementById("topicSelect");
    var newTopicBox = document.getElementById("newTopicBox");

    if (select.value === "new") {
        newTopicBox.style.display = "block";
    } else {
        newTopicBox.style.display = "none";
    }
}


function filterTopics() {
    var input = document.getElementById("topicSearch").value.toLowerCase();
    var select = document.getElementById("topicSelect");
    var options = select.options;

    for (var i = 0; i < options.length; i++) {
        var txt = options[i].text.toLowerCase();
        options[i].style.display = txt.includes(input) ? "" : "none";
    }
}
</script>

{% endblock %}
